<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Cute Gift For You 🐱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      background: radial-gradient(circle at top, #ffdde8, #ffe9f2, #ffd1dc, #17001f);
    }
    .font-love { font-family: 'Pacifico', cursive; }

    .heart {
      position: fixed;
      bottom: -40px;
      color: rgba(255, 70, 130, 0.8);
      animation: floatHeart linear infinite;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-115vh) rotate(360deg) scale(1.8); opacity: 0; }
    }

    .sparkle {
      position: fixed;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 15px white;
      animation: sparkle 2s infinite ease-in-out;
      z-index: 2;
      pointer-events: none;
    }
    @keyframes sparkle {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .glass {
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 25px 60px rgba(121, 0, 65, 0.28);
    }

    /* Gift Box Base */
    .gift-container {
      position: relative;
      width: 160px;
      height: 140px;
      margin: 0 auto;
      cursor: pointer;
    }
    .gift-box {
      width: 150px;
      height: 110px;
      background: linear-gradient(135deg, #ff3f8f, #ff8fb8);
      border-radius: 18px;
      position: absolute;
      bottom: 0;
      left: 5px;
      box-shadow: 0 20px 45px rgba(255, 45, 130, .45);
      z-index: 10;
      animation: bounceGift 1.5s infinite;
    }
    .gift-box::before {
      content: '';
      position: absolute;
      width: 28px;
      height: 110px;
      background: #fff4b8;
      left: 61px;
      top: 0;
    }
    .gift-box::after {
      content: '';
      position: absolute;
      width: 150px;
      height: 28px;
      background: #fff4b8;
      left: 0;
      top: 40px;
    }
    .gift-lid {
      width: 170px;
      height: 35px;
      background: linear-gradient(135deg, #ff1f7a, #ff72aa);
      border-radius: 16px;
      position: absolute;
      top: 0px;
      left: -5px;
      transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      z-index: 11;
    }

    /* Cat Meme Container */
    .cat-wrapper {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      z-index: 5;
      pointer-events: none;
    }

    .cat-img {
      width: 110px;
      height: 80px;
      object-fit: cover;
      border-radius: 20px;
      border: 3px solid #ffffff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    /* Envelope Held by Cat */
    .cat-envelope {
      position: absolute;
      bottom: -10px;
      right: -10px;
      font-size: 32px;
      animation: pulseEnvelope 1.2s infinite alternate;
    }

    /* Open Gift Animation */
    .gift-container.open .gift-box {
      animation: none;
    }
    .gift-container.open .gift-lid {
      transform: translateY(-90px) rotate(-35deg);
      opacity: 0;
    }

    /* Cat Walking Animation (In front of box) */
    .gift-container.open .cat-wrapper {
      z-index: 30;
      animation: catWalkOut 2.8s forwards ease-in-out;
    }

    @keyframes catWalkOut {
      0% {
        transform: translateX(-50%) translateY(0) scale(0.3);
        opacity: 0;
      }
      20% {
        transform: translateX(-50%) translateY(-60px) scale(0.8);
        opacity: 1;
      }
      /* Realistic Walking / Waddling Steps */
      40% {
        transform: translateX(-50%) translateY(-20px) scale(1.1) rotate(-8deg);
      }
      60% {
        transform: translateX(-50%) translateY(20px) scale(1.3) rotate(8deg);
      }
      80% {
        transform: translateX(-50%) translateY(55px) scale(1.5) rotate(-6deg);
      }
      100% {
        transform: translateX(-50%) translateY(75px) scale(1.6) rotate(0deg);
      }
    }

    @keyframes pulseEnvelope {
      from { transform: scale(1); }
      to { transform: scale(1.15) rotate(5deg); }
    }

    .balloon {
      position: absolute;
      width: 60px;
      height: 78px;
      border-radius: 50% 50% 45% 45%;
      animation: balloonFloat 4s ease-in-out infinite;
      z-index: 0;
    }
    .balloon::after {
      content: '';
      position: absolute;
      width: 2px;
      height: 90px;
      background: rgba(255,255,255,.6);
      left: 50%;
      top: 76px;
    }
    @keyframes balloonFloat {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-28px) rotate(4deg); }
    }
    @keyframes bounceGift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 16px;
      animation: confettiFall 3s linear forwards;
      z-index: 40;
    }
    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 text-black relative">

  <!-- Background Balloons -->
  <div class="balloon bg-pink-400 left-8 top-20"></div>
  <div class="balloon bg-purple-400 right-10 top-28" style="animation-delay:1s"></div>
  <div class="balloon bg-yellow-300 left-1/4 bottom-16" style="animation-delay:2s"></div>
  <div class="balloon bg-red-400 right-1/4 bottom-20" style="animation-delay:.5s"></div>

  <main class="relative z-10 w-full max-w-xl">
    <div class="glass rounded-[2rem] p-6 sm:p-10 text-center min-h-[580px] flex flex-col items-center justify-center relative overflow-hidden">
      
      <h2 id="mainHeading" class="font-love text-4xl sm:text-5xl mb-2 text-black transition-all">A Gift For You 🎁</h2><br>
      <p id="instructionText" class="mb-10 text-black/80 text-sm sm:text-base">Tap the gift box to open!</p>

      <!-- Gift & Walking Cat Wrapper -->
      <div class="gift-container relative mb-12" id="giftWrapper" onclick="openGift()">
        
        <!-- Walking Meme Cat Holding Letter -->
        <div class="cat-wrapper" id="catWrapper">
          <div class="relative">
            <img src="https://i.pinimg.com/originals/59/54/b4/5954b408c66525ad932faa693a647e3f.jpg" alt="Meme Cat" class="cat-img" />
            <span class="cat-envelope">💌</span>
          </div>
        </div>

        <div class="gift-lid"></div>
        <div class="gift-box"></div>
      </div>

      <!-- Letter Content (Appears after Cat walks to you) -->
      <div id="noteBox" class="hidden max-w-md bg-white/50 border border-white p-6 rounded-3xl shadow-2xl z-40 transform transition-all duration-700 scale-95 opacity-0">
        <p class="font-love text-pink-600 text-3xl mb-2">Here is your letter! 💌</p>
        <p class="text-gray-800 text-sm sm:text-base font-medium leading-relaxed mb-4">
          "Inside this letter is my warmest hug, endless prayers, and best wishes for your special day. May your life be filled with pure happiness! ❤️"
        </p>
        
        <a id="nextBtn" href="cake_4th.html" class="inline-block bg-gradient-to-r from-pink-500 to-rose-500 text-white px-8 py-3.5 rounded-full font-bold shadow-xl hover:scale-105 active:scale-95 transition">
          Make A Wish & Blow Candle 🕯️
        </a>
      </div>

    </div>
  </main>

  <script>
    let isOpened = false;

    function openGift() {
      if (isOpened) return;
      isOpened = true;

      // Start Box Open & Cat Walking Animation
      document.getElementById('giftWrapper').classList.add('open');
      document.getElementById('instructionText').textContent = "Look! The cute cat is bringing a letter for you... 🐱✨";

      // Pop Confetti Effect
      launchConfetti(70);

      // After Cat finishes walking (2.8s), show the letter
      setTimeout(() => {
        document.getElementById('instructionText').textContent = "The cat delivered your birthday letter! ❤️";
        const note = document.getElementById('noteBox');
        note.classList.remove('hidden');
        
        setTimeout(() => {
          note.classList.remove('scale-95', 'opacity-0');
          note.classList.add('scale-100', 'opacity-100');
        }, 50);

      }, 2800);
    }

    function createFloatingHearts() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = ['❤️','💖','💕','💗','💘'][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = (18 + Math.random() * 28) + 'px';
        heart.style.animationDuration = (4 + Math.random() * 4) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }, 350);
    }

    function createSparkles() {
      for (let i = 0; i < 35; i++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        sp.style.left = Math.random() * 100 + 'vw';
        sp.style.top = Math.random() * 100 + 'vh';
        sp.style.animationDelay = Math.random() * 3 + 's';
        document.body.appendChild(sp);
      }
    }

    function launchConfetti(amount = 100) {
      const colors = ['#ff4d94', '#fff176', '#7c4dff', '#00e5ff', '#ffffff', '#ff1744'];
      for (let i = 0; i < amount; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDelay = Math.random() * 1.2 + 's';
        c.style.animationDuration = (2 + Math.random() * 2.5) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4500);
      }
    }

    createFloatingHearts();
    createSparkles();
  </script>
</body>
</html>
