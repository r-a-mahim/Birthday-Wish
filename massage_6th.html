<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      background: radial-gradient(circle at top, #ffdde8, #ffe9f2, #ffd1dc, #17001f);
      min-height: 100vh;
    }
    .font-love { font-family: 'Pacifico', cursive; }

    .glass {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 25px 60px rgba(121, 0, 65, 0.25);
    }

    /* Floating Hearts Animation */
    .heart {
      position: fixed;
      bottom: -40px;
      color: rgba(255, 70, 130, 0.8);
      animation: floatHeart linear infinite;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-115vh) rotate(360deg) scale(1.8); opacity: 0; }
    }

    .sparkle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 12px white;
      animation: sparkle 2s infinite ease-in-out;
      z-index: 2;
      pointer-events: none;
    }
    @keyframes sparkle {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    /* Envelope Styling */
    .envelope-box {
      cursor: pointer;
      transition: all 0.4s ease;
    }
    .envelope-box:hover {
      transform: scale(1.03);
    }

    /* Typewriter Cursor */
    .typewriter-cursor::after {
      content: '|';
      animation: blink 0.7s infinite;
      color: #ff2a7a;
      font-weight: bold;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Smooth Fade In Animation */
    .fade-in-up {
      animation: fadeInUp 0.8s ease forwards;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="flex items-center justify-center p-4 relative text-gray-800 min-h-screen">

  <main class="relative z-10 w-full max-w-2xl my-auto">
    
    <!-- 1. Interactive Envelope (Initial View) -->
    <div id="envelopeSection" class="envelope-box glass rounded-[2.5rem] p-8 sm:p-12 text-center flex flex-col items-center justify-center min-h-[420px]">
      <div class="text-7xl mb-4 animate-bounce">💌</div>
      <h2 class="font-love text-3xl sm:text-4xl text-pink-600 mb-3">You Have A Secret Letter</h2>
      <p class="text-gray-700 text-sm sm:text-base font-medium mb-6">Tap the envelope to open your birthday message ✨</p>
      <button onclick="openLetter()" class="bg-gradient-to-r from-pink-500 to-rose-500 text-white px-8 py-3.5 rounded-full font-semibold shadow-lg hover:shadow-xl transition">
        Open Letter ❤️
      </button>
    </div>

    <!-- 2. Final Message Card with Typewriter Effect -->
    <div id="cardSection" class="hidden glass rounded-[2.5rem] p-6 sm:p-10 text-center relative overflow-hidden transition-all duration-700">
      
      <!-- Top Title -->
      <div class="flex items-center justify-center gap-2 mb-4">
        <h1 class="font-love text-3xl sm:text-5xl text-gray-900 drop-shadow-sm">
          Happy Birthday My Love <span class="inline-block animate-pulse">🎂</span>
        </h1>
      </div>

      <!-- Typewriter Letter Area -->
      <div class="bg-white/40 backdrop-blur-md rounded-2xl p-6 sm:p-8 border border-white/60 shadow-inner mb-6 text-left sm:text-center">
        <p id="typedText" class="text-gray-800 text-sm sm:text-base font-medium leading-relaxed sm:leading-loose typewriter-cursor min-h-[160px]">
          <!-- Text will be typed dynamically -->
        </p>
      </div>

      <!-- Locked Final Wish Button -->
      <div class="flex items-center justify-center">
        <a id="finalWishBtn" href="Surprise.html" class="hidden bg-white hover:bg-gray-50 text-pink-600 font-bold px-8 py-3 rounded-full shadow-lg text-sm transition flex items-center gap-2 border border-pink-200 fade-in-up">
          ✨ Final wish 🥺
        </a>
      </div>

    </div>

  </main>

  <script>
    const fullMessage = "On your special day, I just want to say that you are one of the most beautiful blessings in my life. Your smile makes my world softer, your presence makes my heart peaceful, and your love makes every day feel special.\n\nMay Allah bless you with endless happiness, health, success, love, and every dream your heart silently prays for. I am so lucky to have you. ❤️";

    document.getElementById('envelopeSection').addEventListener('click', openLetter);

    function openLetter() {
      // 1. Play Background Music immediately on click
      const audio = document.getElementById('bgMusic');
      audio.play().catch(e => console.log("Audio play error:", e));

      // 2. Hide envelope & show letter card
      document.getElementById('envelopeSection').classList.add('hidden');
      const card = document.getElementById('cardSection');
      card.classList.remove('hidden');

      // 3. Start Typewriter Animation
      typeWriterEffect(fullMessage, 'typedText', 35);
    }

    function typeWriterEffect(text, elementId, speed) {
      let i = 0;
      const elem = document.getElementById(elementId);
      elem.innerHTML = "";

      function type() {
        if (i < text.length) {
          if (text.charAt(i) === '\n') {
            elem.innerHTML += '<br><br>';
          } else {
            elem.innerHTML += text.charAt(i);
          }
          i++;
          setTimeout(type, speed);
        } else {
          elem.classList.remove('typewriter-cursor');
          setTimeout(() => {
            const btn = document.getElementById('finalWishBtn');
            btn.classList.remove('hidden');
          }, 400);
        }
      }
      type();
    }

    // Background Animations
    function createFloatingHearts() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = ['❤️','💖','💕','💗','💘'][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = (18 + Math.random() * 28) + 'px';
        heart.style.animationDuration = (4 + Math.random() * 4) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }, 350);
    }

    function createSparkles() {
      for (let i = 0; i < 35; i++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        sp.style.left = Math.random() * 100 + 'vw';
        sp.style.top = Math.random() * 100 + 'vh';
        sp.style.animationDelay = Math.random() * 3 + 's';
        document.body.appendChild(sp);
      }
    }

    createFloatingHearts();
    createSparkles();
  </script>
</body>
</html>
