<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday My Minsi Friend</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      background: radial-gradient(circle at top, #ffdde8, #ffe9f2, #ffd1dc, #17001f);
    }
    .font-love { font-family: 'Pacifico', cursive; }

    .heart {
      position: fixed;
      bottom: -40px;
      color: rgba(255, 70, 130, 0.8);
      animation: floatHeart linear infinite;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-115vh) rotate(360deg) scale(1.8); opacity: 0; }
    }

    .sparkle {
      position: fixed;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 15px white;
      animation: sparkle 2s infinite ease-in-out;
      z-index: 2;
      pointer-events: none;
    }
    @keyframes sparkle {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .glass {
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 25px 60px rgba(121, 0, 65, 0.28);
    }

    .balloon {
      position: absolute;
      width: 60px;
      height: 78px;
      border-radius: 50% 50% 45% 45%;
      animation: balloonFloat 4s ease-in-out infinite;
      z-index: 0;
    }
    .balloon::after {
      content: '';
      position: absolute;
      width: 2px;
      height: 90px;
      background: rgba(255,255,255,.6);
      left: 50%;
      top: 76px;
    }
    @keyframes balloonFloat {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-28px) rotate(4deg); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 text-black relative">

  <!-- Background Balloons -->
  <div class="balloon bg-pink-400 left-8 top-20"></div>
  <div class="balloon bg-purple-400 right-10 top-28" style="animation-delay:1s"></div>
  <div class="balloon bg-yellow-300 left-1/4 bottom-16" style="animation-delay:2s"></div>
  <div class="balloon bg-red-400 right-1/4 bottom-20" style="animation-delay:.5s"></div>

  <main class="relative z-10 w-full max-w-3xl">
    <div class="glass rounded-[2rem] p-6 sm:p-10 text-center min-h-[560px] flex items-center justify-center">
      <section class="w-full">
        <p class="uppercase tracking-[.35em] text-sm text-black mb-4">A tiny surprise for you</p>
        <h1 class="font-love text-5xl sm:text-7xl text-black drop-shadow-lg mb-6">Hey Madam  🫣</h1>
        <p class="text-lg sm:text-xl text-black/90 max-w-xl mx-auto mb-8">
          Today is the prettiest day. It is the day my favorite friend came into this world.
        </p>
        <button onclick="goToNextPage('latter_2nd.html')" class="bg-white text-pink-600 px-8 py-4 rounded-full font-bold shadow-xl hover:scale-105 active:scale-95 transition">
          click here 🥺 🎵
        </button>
      </section>
    </div>
  </main>

  <script>
    function goToNextPage(page) {
      window.location.href = page;
    }
    function createFloatingHearts() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = ['❤️','💖','💕','💗','💘'][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = (18 + Math.random() * 28) + 'px';
        heart.style.animationDuration = (4 + Math.random() * 4) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }, 350);
    }

    function createSparkles() {
      for (let i = 0; i < 35; i++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        sp.style.left = Math.random() * 100 + 'vw';
        sp.style.top = Math.random() * 100 + 'vh';
        sp.style.animationDelay = Math.random() * 3 + 's';
        document.body.appendChild(sp);
      }
    }

    createFloatingHearts();
    createSparkles();
  </script>
</body>
</html>
