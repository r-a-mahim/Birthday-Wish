<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Letters For You</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      background: radial-gradient(circle at top, #ffdde8, #ffe9f2, #ffd1dc, #17001f);
    }
    .font-love { font-family: 'Pacifico', cursive; }

    .heart {
      position: fixed;
      bottom: -40px;
      color: rgba(255, 70, 130, 0.8);
      animation: floatHeart linear infinite;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-115vh) rotate(360deg) scale(1.8); opacity: 0; }
    }

    .sparkle {
      position: fixed;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 15px white;
      animation: sparkle 2s infinite ease-in-out;
      z-index: 2;
      pointer-events: none;
    }
    @keyframes sparkle {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    .glass {
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 25px 60px rgba(121, 0, 65, 0.28);
    }

    .balloon {
      position: absolute;
      width: 60px;
      height: 78px;
      border-radius: 50% 50% 45% 45%;
      animation: balloonFloat 4s ease-in-out infinite;
      z-index: 0;
    }
    .balloon::after {
      content: '';
      position: absolute;
      width: 2px;
      height: 90px;
      background: rgba(255,255,255,.6);
      left: 50%;
      top: 76px;
    }
    @keyframes balloonFloat {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-28px) rotate(4deg); }
    }

    /* Envelope Styling */
    .letter-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .letter-card:hover {
      transform: translateY(-8px) scale(1.03);
    }
    .letter-card.opened {
      border-color: #ff4d8d;
      background: rgba(255, 255, 255, 0.7);
    }

    /* Modal Animation */
    .modal-enter {
      animation: popModal 0.4s ease forwards;
    }
    @keyframes popModal {
      from { opacity: 0; transform: scale(0.8) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 text-black relative">

  <!-- Background Balloons -->
  <div class="balloon bg-pink-400 left-8 top-20"></div>
  <div class="balloon bg-purple-400 right-10 top-28" style="animation-delay:1s"></div>
  <div class="balloon bg-yellow-300 left-1/4 bottom-16" style="animation-delay:2s"></div>
  <div class="balloon bg-red-400 right-1/4 bottom-20" style="animation-delay:.5s"></div>

  <main class="relative z-10 w-full max-w-3xl">
    <div class="glass rounded-[2rem] p-6 sm:p-10 text-center min-h-[560px] flex flex-col items-center justify-center">
      
      <h2 class="font-love text-4xl sm:text-5xl mb-3 text-black">Secret Letters For You 💌</h2>
      <p class="mb-8 text-black/80 text-sm sm:text-base">Click and open all 3 letters to reveal why you are special!</p>

      <!-- 3 Letters Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 w-full max-w-2xl mb-8">
        
        <!-- Letter 1 -->
        <div onclick="openLetter(1)" id="letter-1" class="letter-card bg-white/40 border border-white/60 p-6 rounded-2xl shadow-lg text-center flex flex-col items-center justify-center">
          <div class="text-5xl mb-3">✉️</div>
          <p class="font-semibold text-lg text-gray-800">Reason 1</p>
          <span id="badge-1" class="text-xs bg-pink-500 text-white px-2.5 py-1 rounded-full mt-2 hidden">Opened ✨</span>
        </div>

        <!-- Letter 2 -->
        <div onclick="openLetter(2)" id="letter-2" class="letter-card bg-white/40 border border-white/60 p-6 rounded-2xl shadow-lg text-center flex flex-col items-center justify-center">
          <div class="text-5xl mb-3">💌</div>
          <p class="font-semibold text-lg text-gray-800">Reason 2</p>
          <span id="badge-2" class="text-xs bg-pink-500 text-white px-2.5 py-1 rounded-full mt-2 hidden">Opened ✨</span>
        </div>

        <!-- Letter 3 -->
        <div onclick="openLetter(3)" id="letter-3" class="letter-card bg-white/40 border border-white/60 p-6 rounded-2xl shadow-lg text-center flex flex-col items-center justify-center">
          <div class="text-5xl mb-3">📬</div>
          <p class="font-semibold text-lg text-gray-800">Reason 3</p>
          <span id="badge-3" class="text-xs bg-pink-500 text-white px-2.5 py-1 rounded-full mt-2 hidden">Opened ✨</span>
        </div>

      </div>

      <!-- Continue Button (Hidden at start) -->
      <a id="nextBtn" href="gift_3rd.html" class="hidden bg-gradient-to-r from-pink-500 to-rose-500 text-white px-8 py-4 rounded-full font-bold shadow-xl hover:scale-105 active:scale-95 transition">
        Unlock Next Surprise 🎁
      </a>

    </div>
  </main>

  <!-- Popup Modal for Letters -->
  <div id="letterModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center px-4">
    <div class="glass bg-white/90 border border-white p-8 rounded-3xl max-w-md w-full text-center relative modal-enter shadow-2xl">
      <div id="modalIcon" class="text-6xl mb-4">💌</div>
      <h3 id="modalTitle" class="font-love text-3xl text-pink-600 mb-3">Reason 1</h3>
      <p id="modalText" class="text-gray-700 text-base leading-relaxed mb-6 font-medium">
        Message goes here...
      </p>
      <button onclick="closeLetter()" class="bg-pink-600 text-white px-6 py-2.5 rounded-full font-semibold hover:bg-pink-700 transition">
        Close Note ❤️
      </button>
    </div>
  </div>

  <script>
    // 💌 চিঠির টেক্সটগুলো এখান থেকে কাস্টমাইজ করতে পারবেন:
    const lettersData = {
      1: {
        icon: "💖",
        title: "Your Smile",
        text: "Your smile is genuinely the brightest thing in my day. It has this magical way of making everything feel instantly better!"
      },
      2: {
        icon: "🌸",
        title: "Your Kind Heart",
        text: "The way you care about people and bring peace wherever you go is something truly rare and beautiful."
      },
      3: {
        icon: "✨",
        title: "My Favorite Person",
        text: "Simply put, life is so much happier, sweeter, and more special with you in it. Thank you for just being you!"
      }
    };

    let openedLetters = new Set();

    function openLetter(id) {
      const data = lettersData[id];
      document.getElementById('modalIcon').textContent = data.icon;
      document.getElementById('modalTitle').textContent = data.title;
      document.getElementById('modalText').textContent = data.text;
      
      document.getElementById('letterModal').classList.remove('hidden');

      // Mark as opened
      openedLetters.add(id);
      document.getElementById(`letter-${id}`).classList.add('opened');
      document.getElementById(`badge-${id}`).classList.remove('hidden');

      // Check if all 3 are opened
      if (openedLetters.size === 3) {
        document.getElementById('nextBtn').classList.remove('hidden');
      }
    }

    function closeLetter() {
      document.getElementById('letterModal').classList.add('hidden');
    }

    // Background Animations
    function createFloatingHearts() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = ['❤️','💖','💕','💗','💘'][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = (18 + Math.random() * 28) + 'px';
        heart.style.animationDuration = (4 + Math.random() * 4) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }, 350);
    }

    function createSparkles() {
      for (let i = 0; i < 35; i++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        sp.style.left = Math.random() * 100 + 'vw';
        sp.style.top = Math.random() * 100 + 'vh';
        sp.style.animationDelay = Math.random() * 3 + 's';
        document.body.appendChild(sp);
      }
    }

    createFloatingHearts();
    createSparkles();
  </script>
</body>
</html>
