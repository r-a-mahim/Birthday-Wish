<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Good vs Cute Flaws 💖</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      background: radial-gradient(circle at top, #ffdde8, #ffe9f2, #ffd1dc, #17001f);
      min-height: 100vh;
    }
    .font-love { font-family: 'Pacifico', cursive; }

    .glass {
      background: rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 25px 60px rgba(121, 0, 65, 0.25);
    }

    /* Floating Hearts Background */
    .heart {
      position: fixed;
      bottom: -40px;
      color: rgba(255, 70, 130, 0.8);
      animation: floatHeart linear infinite;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes floatHeart {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(-115vh) rotate(360deg) scale(1.8); opacity: 0; }
    }

    .sparkle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 12px white;
      animation: sparkle 2s infinite ease-in-out;
      z-index: 2;
      pointer-events: none;
    }
    @keyframes sparkle {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
    }

    /* Modal Animation */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }
    .modal-box {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* Checked Indicator Badge */
    .checked-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #10b981;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body class="flex items-center justify-center p-4 relative text-gray-800 min-h-screen">

  <!-- Audio Elements for 2 Different Songs -->
  <audio id="goodMusic" src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=sweet-love-111666.mp3"></audio>
  <audio id="badMusic" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a7212d.mp3?filename=happy-birthday-15220.mp3"></audio>

  <main class="relative z-10 w-full max-w-2xl my-auto py-8">
    
    <div class="glass rounded-[2.5rem] p-6 sm:p-10 text-center relative overflow-hidden">
      
      <!-- Heading -->
      <h1 class="font-love text-3xl sm:text-5xl text-gray-900 mb-2 drop-shadow-sm">
        The Analysis Of You 📊❤️
      </h1>
      <p id="instructionText" class="text-gray-700 text-xs sm:text-sm font-medium mb-8">
        Tap both buttons below to reveal your traits & unlock the next page!
      </p>

      <!-- 2 Main Action Buttons -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8 max-w-md mx-auto">
        
        <!-- Good Traits Button -->
        <div class="relative">
          <button id="btnGood" onclick="openBox('good')" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold p-5 rounded-2xl shadow-xl hover:scale-105 active:scale-95 transition flex flex-col items-center justify-center gap-2 border border-white/40">
            <span class="text-3xl">🌟</span>
            <span class="text-base sm:text-lg">Your Good Traits</span>
            <span class="text-xs text-emerald-100 font-normal">কেন তোমাকে এত পছন্দ করি</span>
          </button>
          <span id="badgeGood" class="checked-badge hidden">✓</span>
        </div>

        <!-- Bad Traits Button -->
        <div class="relative">
          <button id="btnBad" onclick="openBox('bad')" class="w-full bg-gradient-to-r from-rose-500 to-pink-500 text-white font-bold p-5 rounded-2xl shadow-xl hover:scale-105 active:scale-95 transition flex flex-col items-center justify-center gap-2 border border-white/40">
            <span class="text-3xl">😈</span>
            <span class="text-base sm:text-lg">Annoying Habits</span>
            <span class="text-xs text-pink-100 font-normal">যেগুলোর জন্য রাগ হয়</span>
          </button>
          <span id="badgeBad" class="checked-badge hidden">✓</span>
        </div>

      </div>

      <!-- Verdict Box -->
      <div class="bg-white/50 border border-white rounded-2xl p-5 mb-8 text-center shadow-md">
        <h3 class="font-love text-2xl text-pink-600 mb-1">Final Verdict ⚖️</h3>
        <p class="text-gray-800 text-xs sm:text-sm font-semibold">
          Overall Cuteness: <span class="text-emerald-600">100/100</span> | Overall Annoyingness: <span class="text-rose-600">100/100</span>
        </p>
        <p class="text-gray-700 text-xs sm:text-sm italic mt-2">
          "তোমার এই সব মিষ্টি খারাপ গুণগুলোসহ তোমাকেই সবচেয়ে বেশি ভালোবাসি! ❤️"
        </p>
      </div>

      <!-- Final Navigation Button (Initially Hidden) -->
      <div class="flex items-center justify-center">
      <a id="continueBtn" href="massage_6th.html" class="hidden bg-gradient-to-r from-pink-500 to-rose-500 text-white px-8 py-3.5 rounded-full font-bold shadow-lg hover:scale-105 active:scale-95 transition text-sm animate-bounce">
          Continue to Final Surprise 💌
        </a>
      </div>

    </div>

  </main>

  <!-- Small-Sized Popup Box (Modal) -->
  <div id="traitModal" class="fixed inset-0 modal-backdrop z-50 flex items-center justify-center p-4 hidden opacity-0">
    <div id="modalBox" class="bg-white/95 backdrop-blur-xl border border-white/80 rounded-2xl p-5 max-w-sm w-full shadow-2xl modal-box transform scale-90 relative">
      
      <!-- Close Button -->
      <button onclick="closeBox()" class="absolute top-3 right-3 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-full w-7 h-7 flex items-center justify-center font-bold text-xs transition">
        ✕
      </button>

      <!-- Modal Header -->
      <div class="text-center mb-4 pr-4">
        <span id="modalIcon" class="text-3xl block mb-1">🌟</span>
        <h2 id="modalTitle" class="font-love text-xl text-gray-900">Your Good Traits</h2>
      </div>

      <!-- Modal Content List -->
      <div id="modalContent" class="space-y-2.5 text-left max-h-[50vh] overflow-y-auto pr-1 text-xs sm:text-sm text-gray-800">
        <!-- Content inserted dynamically -->
      </div>

      <!-- Modal Footer Button -->
      <button onclick="closeBox()" class="mt-4 w-full bg-pink-500 hover:bg-pink-600 text-white py-2 rounded-xl font-semibold transition text-xs sm:text-sm">
        Got It! ❤️
      </button>

    </div>
  </div>

  <script>
    const goodData = [
      "💖 <b>Care & Love:</b> অনেক বেশি টেককেয়ার করো এবং সবসময় খেয়াল রাখো।",
      "😊 <b>Cutest Smile:</b> হাসলে পৃথিবীর সবচেয়ে মিষ্টি লাগে দেখতে।",
      "🌸 <b>Soft Hearted:</b> মনটা অনেক নরম এবং খুব সহজেই সবাইকে বিশ্বাস করো।",
      "✨ <b>Always Supporter:</b> যেকোনো সমস্যায় নিঃশর্তভাবে পাশে থাকো।",
      "🥰 <b>My Comfort Zone:</b> যার সাথে কথা বললে সব মানসিক চাপ একদম কমে যায়।"
    ];

    const badData = [
      "🙈 <b>Mood Swings:</b> হুটহাট না জানিয়ে মুড অফ করে বসে থাকা।",
      "😠 <b>Cute Anger:</b> ফালতু কারণে ছোট বাচ্চাদের মতো রাগ দেখানো।",
      "🍕 <b>Food Decisions:</b> 'কী খাবো?' জিজ্ঞেস করলে সবসময় 'যেকোনো কিছু' বলা!",
      "📱 <b>Late Replies:</b> মাঝে মাঝে মেসেজের রিপ্লাই দিতে অনেক দেরি করা।",
      "💤 <b>Sleepyhead:</b> সারাদিন অলসতা করা আর প্রচুর ঘুমানো!"
    ];

    let hasSeenGood = false;
    let hasSeenBad = false;

    const goodAudio = document.getElementById('goodMusic');
    const badAudio = document.getElementById('badMusic');

    function stopAllMusic() {
      if (goodAudio) { goodAudio.pause(); goodAudio.currentTime = 0; }
      if (badAudio) { badAudio.pause(); badAudio.currentTime = 0; }
    }

    function openBox(type) {
      stopAllMusic();

      const modal = document.getElementById('traitModal');
      const box = document.getElementById('modalBox');
      const icon = document.getElementById('modalIcon');
      const title = document.getElementById('modalTitle');
      const content = document.getElementById('modalContent');

      content.innerHTML = "";

      if (type === 'good') {
        hasSeenGood = true;
        document.getElementById('badgeGood').classList.remove('hidden');

        icon.textContent = "🌟";
        title.textContent = "Your Best Traits";
        title.className = "font-love text-xl sm:text-2xl text-emerald-600";
        goodData.forEach(item => {
          content.innerHTML += `<div class="p-2.5 bg-emerald-50/80 border border-emerald-100 rounded-lg leading-relaxed">${item}</div>`;
        });

        goodAudio.play().catch(() => {});

      } else {
        hasSeenBad = true;
        document.getElementById('badgeBad').classList.remove('hidden');

        icon.textContent = "😈";
        title.textContent = "Cute Annoying Habits";
        title.className = "font-love text-xl sm:text-2xl text-rose-600";
        badData.forEach(item => {
          content.innerHTML += `<div class="p-2.5 bg-rose-50/80 border border-rose-100 rounded-lg leading-relaxed">${item}</div>`;
        });

        badAudio.play().catch(() => {});
      }

      modal.classList.remove('hidden');
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        box.classList.remove('scale-90');
        box.classList.add('scale-100');
      }, 10);
    }

    function closeBox() {
      const modal = document.getElementById('traitModal');
      const box = document.getElementById('modalBox');

      stopAllMusic();

      box.classList.remove('scale-100');
      box.classList.add('scale-90');
      modal.classList.add('opacity-0');

      setTimeout(() => {
        modal.classList.add('hidden');
        
        // Check if both traits have been seen
        checkUnlockNextButton();
      }, 300);
    }

    function checkUnlockNextButton() {
      if (hasSeenGood && hasSeenBad) {
        const btn = document.getElementById('continueBtn');
        btn.classList.remove('hidden');
        document.getElementById('instructionText').textContent = "Great! You unlocked the final surprise below 🎉";
      }
    }

    // Background Animations
    function createFloatingHearts() {
      setInterval(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = ['❤️','💖','💕','💗','💘'][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = (18 + Math.random() * 28) + 'px';
        heart.style.animationDuration = (4 + Math.random() * 4) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 8000);
      }, 350);
    }

    function createSparkles() {
      for (let i = 0; i < 35; i++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        sp.style.left = Math.random() * 100 + 'vw';
        sp.style.top = Math.random() * 100 + 'vh';
        sp.style.animationDelay = Math.random() * 3 + 's';
        document.body.appendChild(sp);
      }
    }

    createFloatingHearts();
    createSparkles();
  </script>
</body>
</html>
